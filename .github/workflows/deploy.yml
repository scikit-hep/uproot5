name: Deploy to PyPI

on:
  workflow_dispatch:
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  build_dist:
    name: Build and upload sdist and wheel
    if: github.repository_owner == 'scikit-hep'
    uses: ./.github/workflows/build-distributions.yml

  publish:
    name: Publish to PyPI
    environment:
      name: pypi
    needs: [build_dist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      id-token: write # Required for trusted publishing to PyPI.
      attestations: write # Required to generate artifact attestations for the release artifacts.
      contents: read

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Packages
          path: dist

      - name: List distributions to be deployed
        run: ls -lha dist/

      - name: Generate artifact attestation for sdist and wheel
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/uproot-*

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          print-hash: true
